<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Vercel and Supabase</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3d;
      --yes: #00e5a0;
      --no: #ff4d6d;
      --text: #e8e8f0;
      --muted: #5a5a7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 64px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--yes);
      border: 1px solid rgba(0,229,160,0.25);
      border-radius: 100px;
      padding: 4px 12px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--yes);
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 44px;
      letter-spacing: 0.02em;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 12px;
      padding: 16px 40px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }
    .btn:active::after { opacity: 0.12; }

    .btn-yes {
      background: var(--yes);
      color: #0a0a0f;
      box-shadow: 0 0 24px rgba(0,229,160,0.3);
    }
    .btn-yes:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,229,160,0.45);
    }

    .btn-no {
      background: transparent;
      color: var(--no);
      border: 1.5px solid var(--no);
      box-shadow: 0 0 16px rgba(255,77,109,0.15);
    }
    .btn-no:hover {
      transform: translateY(-3px);
      background: rgba(255,77,109,0.08);
      box-shadow: 0 8px 24px rgba(255,77,109,0.3);
    }

    /* Result toast */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 12px 28px;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
      opacity: 0;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.yes { color: var(--yes); border-color: rgba(0,229,160,0.3); }
    .toast.no  { color: var(--no);  border-color: rgba(255,77,109,0.3); }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="badge">local · v1.0.0</div>
    <h1>Test Vercel<br>and Supabase</h1>
    <p class="sub">Is your integration ready to deploy?</p>
    <div class="buttons">
      <button class="btn btn-yes" onclick="respond('yes')">YES</button>
      <button class="btn btn-no"  onclick="respond('no')">NO</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function respond(choice) {
      const toast = document.getElementById('toast');
      toast.className = 'toast ' + choice;
      toast.textContent = choice === 'yes'
        ? '✓ Awesome — let\'s ship it!'
        : '✗ Not yet — keep going!';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>

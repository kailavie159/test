<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog · Đăng & Xoá Bài</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0f0e0c;
      --paper:  #f5f2ed;
      --cream:  #ede8df;
      --accent: #c8442a;
      --muted:  #8a8478;
      --border: #d5cfc4;
      --white:  #ffffff;
      --shadow: 0 2px 16px rgba(15,14,12,.10);
      --radius: 3px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      color: var(--white);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      letter-spacing: .02em;
    }
    header .logo span { color: var(--accent); }
    header .badge {
      background: var(--accent);
      color: #fff;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
    }

    /* ── LAYOUT ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── COMPOSE CARD ── */
    .compose {
      background: var(--white);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 2rem 2rem 1.6rem;
      margin-bottom: 3rem;
      box-shadow: var(--shadow);
    }
    .compose h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      margin-bottom: 1.4rem;
      color: var(--ink);
    }

    .field { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    input, textarea {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .7rem .9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: none;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,68,42,.12);
    }
    textarea { min-height: 110px; }

    .row { display: flex; gap: .8rem; }
    .row .field { flex: 1; }

    /* ── BUTTON ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .7rem 1.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .15s, opacity .15s, box-shadow .15s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--ink);
      color: var(--white);
    }
    .btn-primary:hover { background: #2a2821; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-actions { margin-top: .4rem; justify-content: flex-end; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: .75rem 1.2rem;
      border-radius: var(--radius);
      font-size: .88rem;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
      max-width: 300px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #2d6a4f; }
    #toast.error   { background: var(--accent); }

    /* ── SECTION TITLE ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: .8rem;
      margin-bottom: 1.5rem;
    }
    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
    }
    #post-count {
      font-size: .8rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--cream) 25%, var(--border) 50%, var(--cream) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .skeleton-card { height: 140px; margin-bottom: 1rem; }

    /* ── POST CARD ── */
    .post-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.6rem 1.2rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      position: relative;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .post-card .post-meta {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: .7rem;
    }
    .post-card .author-chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .75rem;
      font-weight: 500;
      color: var(--muted);
    }
    .author-chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .post-card .date {
      font-size: .72rem;
      color: var(--border);
      margin-left: auto;
    }

    .post-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      margin-bottom: .5rem;
      line-height: 1.35;
    }
    .post-card p {
      font-size: .9rem;
      color: #555;
      line-height: 1.6;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .post-card .card-footer {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .8rem;
      padding: .4rem .9rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      display: inline-flex; align-items: center; gap: .35rem;
    }
    .btn-delete:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,68,42,.05);
    }
    .btn-delete.deleting { opacity: .5; pointer-events: none; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty svg { margin-bottom: 1rem; opacity: .3; }
    .empty p { font-size: .95rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      .row { flex-direction: column; gap: 0; }
      .compose { padding: 1.4rem 1.2rem 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Nhật<span>Ký</span></div>
  <div class="badge">Blog cá nhân</div>
</header>

<div class="page">

  <!-- Compose -->
  <div class="compose">
    <h2>✍️ Đăng bài mới</h2>
    <div class="row">
      <div class="field">
        <label for="title">Tiêu đề</label>
        <input id="title" type="text" placeholder="Nhập tiêu đề bài viết…" maxlength="120" />
      </div>
      <div class="field" style="max-width:180px">
        <label for="author">Tác giả</label>
        <input id="author" type="text" placeholder="Tên của bạn" maxlength="50" />
      </div>
    </div>
    <div class="field">
      <label for="content">Nội dung</label>
      <textarea id="content" placeholder="Chia sẻ điều gì đó hôm nay…"></textarea>
    </div>
    <div class="btn-actions row">
      <button class="btn btn-primary" id="submitBtn" onclick="submitPost()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Đăng bài
      </button>
    </div>
  </div>

  <!-- Feed -->
  <div class="section-header">
    <h2>Bài viết</h2>
    <span id="post-count">đang tải…</span>
  </div>
  <div id="feed"></div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = '/api/posts';

  // ── TOAST ──────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── FORMAT DATE ────────────────────────────────────────
  function fmt(iso) {
    const d = new Date(iso);
    return d.toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  // ── RENDER FEED ────────────────────────────────────────
  function renderFeed(posts) {
    const feed = document.getElementById('feed');
    document.getElementById('post-count').textContent =
      posts.length ? `${posts.length} bài` : '0 bài';

    if (!posts.length) {
      feed.innerHTML = `
        <div class="empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>Chưa có bài viết nào. Hãy đăng bài đầu tiên!</p>
        </div>`;
      return;
    }

    feed.innerHTML = posts.map(p => `
      <div class="post-card" id="card-${p.id}">
        <div class="post-meta">
          <span class="author-chip"><span class="dot"></span>${p.author}</span>
          <span class="date">${fmt(p.createdAt)}</span>
        </div>
        <h3>${escHtml(p.title)}</h3>
        <p>${escHtml(p.content)}</p>
        <div class="card-footer">
          <button class="btn-delete" onclick="deletePost('${p.id}', this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            Xoá bài
          </button>
        </div>
      </div>`).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── LOAD POSTS ─────────────────────────────────────────
  async function loadPosts() {
    const feed = document.getElementById('feed');
    feed.innerHTML = ['','',''].map(() =>
      `<div class="skeleton skeleton-card"></div>`).join('');

    try {
      const res = await fetch(API);
      const data = await res.json();
      renderFeed(data.posts || []);
    } catch {
      feed.innerHTML = `<div class="empty"><p>⚠️ Không thể tải bài viết. Kiểm tra kết nối.</p></div>`;
      document.getElementById('post-count').textContent = 'lỗi';
    }
  }

  // ── SUBMIT POST ────────────────────────────────────────
  async function submitPost() {
    const titleEl   = document.getElementById('title');
    const contentEl = document.getElementById('content');
    const authorEl  = document.getElementById('author');
    const btn       = document.getElementById('submitBtn');

    const title   = titleEl.value.trim();
    const content = contentEl.value.trim();
    const author  = authorEl.value.trim();

    if (!title)   { toast('Vui lòng nhập tiêu đề!', 'error'); titleEl.focus(); return; }
    if (!content) { toast('Vui lòng nhập nội dung!', 'error'); contentEl.focus(); return; }

    btn.disabled = true;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .7s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Đang đăng…`;

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, author }),
      });
      const data = await res.json();
      if (data.success) {
        titleEl.value = contentEl.value = '';
        toast('✅ Đăng bài thành công!');
        loadPosts();
      } else {
        toast(data.message || 'Đăng bài thất bại.', 'error');
      }
    } catch {
      toast('⚠️ Lỗi kết nối tới server.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Đăng bài`;
    }
  }

  // ── DELETE POST ────────────────────────────────────────
  async function deletePost(id, btn) {
    if (!confirm('Bạn có chắc muốn xoá bài này không?')) return;

    btn.classList.add('deleting');
    btn.textContent = 'Đang xoá…';

    try {
      const res = await fetch(`${API}?id=${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        const card = document.getElementById(`card-${id}`);
        card.style.transition = 'opacity .25s, transform .25s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(8px)';
        setTimeout(() => { card.remove(); loadPosts(); }, 260);
        toast('🗑️ Đã xoá bài viết.');
      } else {
        toast(data.message || 'Xoá thất bại.', 'error');
        btn.classList.remove('deleting');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> Xoá bài`;
      }
    } catch {
      toast('⚠️ Lỗi kết nối tới server.', 'error');
    }
  }

  // Enter to submit
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') submitPost();
  });

  // Spin animation
  const style = document.createElement('style');
  style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
  document.head.appendChild(style);

  // Init
  loadPosts();
</script>
</body>
</html>

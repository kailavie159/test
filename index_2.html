<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Vercel and Supabase</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3d;
      --yes: #00e5a0; --no: #ff4d6d; --text: #e8e8f0; --muted: #5a5a7a;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,0.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }
    .card {
      position: relative; background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 56px 64px; text-align: center;
      max-width: 480px; width: 90%; animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; font-size: 11px;
      letter-spacing: 0.12em; color: var(--yes); border: 1px solid rgba(0,229,160,0.25);
      border-radius: 100px; padding: 4px 12px; margin-bottom: 28px; text-transform: uppercase;
    }
    .badge::before { content: ''; width: 6px; height: 6px; background: var(--yes); border-radius: 50%; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(22px, 5vw, 30px); line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 12px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; letter-spacing: 0.02em; }
    .scores { display: flex; justify-content: center; gap: 24px; margin-bottom: 36px; }
    .score-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .score-label { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .score-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
    .score-value.yes { color: var(--yes); } .score-value.no { color: var(--no); }
    .score-divider { width: 1px; background: var(--border); align-self: stretch; }
    .buttons { display: flex; gap: 16px; justify-content: center; }
    .btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.06em; border: none; border-radius: 12px; padding: 16px 40px; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-yes { background: var(--yes); color: #0a0a0f; box-shadow: 0 0 24px rgba(0,229,160,0.3); }
    .btn-yes:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,229,160,0.45); }
    .btn-no { background: transparent; color: var(--no); border: 1.5px solid var(--no); box-shadow: 0 0 16px rgba(255,77,109,0.15); }
    .btn-no:hover:not(:disabled) { transform: translateY(-3px); background: rgba(255,77,109,0.08); box-shadow: 0 8px 24px rgba(255,77,109,0.3); }
    .toast { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 12px 28px; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s; opacity: 0; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.yes { color: var(--yes); border-color: rgba(0,229,160,0.3); }
    .toast.no  { color: var(--no);  border-color: rgba(255,77,109,0.3); }
    .toast.error { color: #ffaa00; border-color: rgba(255,170,0,0.3); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="badge">vercel + supabase</div>
    <h1>Test Vercel<br>and Supabase</h1>
    <p class="sub">Is your integration ready to deploy?</p>
    <div class="scores">
      <div class="score-item">
        <span class="score-label">Yes</span>
        <span class="score-value yes" id="yes-count">—</span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">No</span>
        <span class="score-value no" id="no-count">—</span>
      </div>
    </div>
    <div class="buttons">
      <button class="btn btn-yes" id="btn-yes" onclick="respond('yes')">YES</button>
      <button class="btn btn-no"  id="btn-no"  onclick="respond('no')">NO</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const SUPABASE_URL = 'https://leychrzudzojlpubkvam.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxleWNocnp1ZHpvamxwdWJrdmFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzUzMjQsImV4cCI6MjA5NDIxMTMyNH0.JnNiUqVRXRoJTUTQCiuuQgZpQJEJWg9IHrJIQAPKUcE';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadCounts() {
      const { data } = await db.from('responses').select('choice');
      if (data) {
        document.getElementById('yes-count').textContent = data.filter(r => r.choice === 'yes').length;
        document.getElementById('no-count').textContent  = data.filter(r => r.choice === 'no').length;
      }
    }

    async function respond(choice) {
      document.getElementById('btn-yes').disabled = true;
      document.getElementById('btn-no').disabled  = true;
      const { error } = await db.from('responses').insert({ choice });
      if (error) {
        showToast('error', '✗ Error — check console');
        console.error(error);
      } else {
        showToast(choice, choice === 'yes' ? '✓ Saved to Supabase!' : '✗ Saved to Supabase!');
        await loadCounts();
      }
      document.getElementById('btn-yes').disabled = false;
      document.getElementById('btn-no').disabled  = false;
    }

    function showToast(type, msg) {
      const t = document.getElementById('toast');
      t.className = 'toast ' + type; t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    loadCounts();
  </script>
</body>
</html>
